<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validasi Data SMPN 4 Rangkasbitung</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <div class="header-section">
      <img src="images/LOGO.png" alt="Logo SMPN 4">
      <h2 class="title-main">VALIDASI PENDAFTARAN MURID BARU</h2>
      <h3 class="title-sub">SMPN 4 Rangkasbitung</h3>
    </div>
    
    <form id="myForm">
      
      <div class="form-group">
        <label>No Pendaftaran</label>
        <input type="text" id="noPendaftaran" required maxlength="3" pattern="\d{3}" placeholder="Masukkan 3 Digit No Pendaftaran">
        <span id="noPendaftaranError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>NISN</label>
        <input type="text" id="nisn" required maxlength="10" pattern="\d{10}" placeholder="10 Digit NISN">
        <span id="nisnError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>No Kartu Keluarga (KK)</label>
        <input type="text" id="noKK" required maxlength="16" pattern="\d{16}" placeholder="16 Digit No KK">
        <span id="noKKError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>NIK Siswa</label>
        <input type="text" id="nikSiswa" required maxlength="16" pattern="\d{16}" placeholder="16 Digit NIK Siswa">
        <span id="nikSiswaError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>Nama Lengkap Siswa</label>
        <input type="text" id="nama" placeholder="Sesuai Ijazah / Akta Kelahiran">
        <span id="namaError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>Jenis Kelamin</label>
        <div id="jenisKelaminContainer" class="radio-group">
            <input type="radio" name="jenisKelamin" id="jkL" value="Laki-Laki"> 
            <label for="jkL">Laki-Laki</label>
            <input type="radio" name="jenisKelamin" id="jkP" value="Perempuan"> 
            <label for="jkP">Perempuan</label>
        </div>
        <span id="jenisKelaminError" class="error-text"></span>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>Tanggal Lahir</label>
          <input type="date" id="tgl_lahir" onchange="hitungUsiaOtomatis()">
          <span id="tglLahirError" class="error-text"></span>
        </div>
        <div class="form-group half-width">
          <label>Usia Siswa (Otomatis)</label>
          <input type="text" id="usia_input" placeholder="Tahun Bulan" readonly style="background-color: #e9ecef;">
        </div>
      </div>

      <div class="form-group">
        <label>Asal Sekolah</label>
        <input type="text" id="asalSekolah" placeholder="Contoh: SDN 2 MUARA CIUJUNG BARAT">
        <span id="asalSekolahError" class="error-text"></span>
      </div>

      <hr>

      <div class="form-group">
        <label>Nama Ibu Kandung</label>
        <input type="text" id="namaIbu" placeholder="Nama Ibu Sesuai KK">
        <span id="namaIbuError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>Pekerjaan Ibu Kandung</label>
        <select id="pekerjaanIbu" class="form-select">
          <option value="">-- Pilih Pekerjaan Ibu --</option>
          <option value="PNS">PNS</option>
          <option value="TNI/POLRI">TNI/POLRI</option>
          <option value="Pensiunan">Pensiunan</option>
          <option value="Karyawan Swasta">Karyawan Swasta</option>
          <option value="Wiraswasta">Wiraswasta</option>
          <option value="IRT">Ibu Rumah Tangga (IRT)</option>
          <option value="Buruh">Buruh</option>
          <option value="Petani">Petani</option>
          <option value="Lainnya">Lainnya</option>
        </select>
        <span id="pekerjaanIbuError" class="error-text"></span>
      </div>

      <hr>

      <div class="form-group">
        <label>Nama Ayah Kandung</label>
        <input type="text" id="namaAyah" placeholder="Nama Ayah Sesuai KK">
        <span id="namaAyahError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>Pekerjaan Ayah Kandung</label>
        <select id="pekerjaanAyah" class="form-select">
          <option value="">-- Pilih Pekerjaan Ayah --</option>
          <option value="PNS">PNS</option>
          <option value="TNI/POLRI">TNI/POLRI</option>
          <option value="Pensiunan">Pensiunan</option>
          <option value="Karyawan Swasta">Karyawan Swasta</option>
          <option value="Wiraswasta">Wiraswasta</option>
          <option value="Buruh">Buruh</option>
          <option value="Petani">Petani</option>
          <option value="Lainnya">Lainnya</option>
        </select>
        <span id="pekerjaanAyahError" class="error-text"></span>
      </div>
      
      <hr>

      <div class="form-group">
        <label>Foto Pendaftar & Lokasi GPS</label>
        <button type="button" id="startCameraButton" class="btn-secondary">Aktifkan Kamera & GPS</button>
        <span id="gpsError" class="error-text"></span>

        <div id="cameraContainer" style="display: none; text-align: center;">
            <video id="videoElement" autoplay playsinline></video><br>
            <button type="button" id="captureButton" class="btn-success">Ambil Foto</button>
        </div>
        <canvas id="canvasElement" style="display: none;"></canvas>

        <div id="previewContainer" style="display: none; text-align: center;">
            <img id="photoPreview" src="#"><br>
            <button type="button" id="recaptureButton" class="btn-danger">Foto Ulang</button>
        </div>
        <span id="photoError" class="error-text"></span>
      </div>

      <hr>

      <div class="declaration-container">
          <input type="checkbox" id="declarationCheckbox">
          <label for="declarationCheckbox">Saya menyatakan bahwa data yang diisi adalah benar dan dapat dipertanggungjawabkan.</label>
      </div>
      <span id="declarationError" class="error-text"></span>

      <button type="button" id="submitButton" class="btn-primary">Kirim Data Pendaftaran</button>

      <div id="spinner" class="spinner"></div>
      <div id="statusMessage" style="display:none;"></div>

    </form>
  </div>

 <!-- <script src="js/script.js"></script> -->

script>
    window.onload = function() {
        alert("MAAF, PROSES VALIDASI TELAH BERAKHIR");
    };
</script>

</body>
</html>
