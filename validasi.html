<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Validasi</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">

    <h1 style="margin-bottom: 5px;">COBA INPUT DATA</h1>
    <h3 style="margin-top: 0; color: #555;">DATA SISWA</h3>

    <div style="margin-top: 30px;">
        <label for="inputNisn"><strong>Masukkan NISN Anda:</strong></label><br><br>
        <input type="text" id="inputNisn" placeholder="Contoh: 12345678" style="padding: 10px; width: 200px;">
        <br><br>
        <button id="btnMulai" onclick="kirimData()" style="padding: 10px 20px; background-color: #28a745; color: white; border: none; cursor: pointer;">Mulai</button>
    </div>

    <p id="pesanStatus" style="color: blue; margin-top: 20px;"></p>

    <script>
        function kirimData() {
            var nisnSiswa = document.getElementById('inputNisn').value;
            var pesan = document.getElementById('pesanStatus');
            var tombol = document.getElementById('btnMulai');

            if(nisnSiswa === "") {
                pesan.innerHTML = "NISN tidak boleh kosong!";
                pesan.style.color = "red";
                return;
            }

            pesan.innerHTML = "Sedang memvalidasi dan mengirim data...";
            pesan.style.color = "blue";
            tombol.disabled = true; 

            
            var urlApssScript = "https://script.google.com/macros/s/AKfycbw_OJT7TctYrJBwYGBtQUsRQlXj7PL_6OtJsEsHEXmeZpbawiSIbauX9t8MqZsQV_Gg/exec";

            // Mengirim data menggunakan metode POST
            fetch(urlApssScript, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'nisn=' + encodeURIComponent(nisnSiswa)
            })
            .then(response => response.text())
            .then(data => {
                pesan.innerHTML = "Validasi berhasil! Data NISN tersimpan.";
                pesan.style.color = "green";
                tombol.disabled = false;
                document.getElementById('inputNisn').value = "";
            })
            .catch(error => {
                pesan.innerHTML = "Terjadi kesalahan sistem.";
                pesan.style.color = "red";
                tombol.disabled = false;
            });
        }
    </script>
</body>
</html>
